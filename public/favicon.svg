<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <style>
    .bg { fill: #121212; }
    .f-shape { 
      fill: #ffffff; 
    }
    .dot {
      fill: #34d399; /* Accent green */
      animation: bounce 1.5s infinite ease-in-out;
      transform-origin: 46px 46px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.3); }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="16" />
  <path class="f-shape" d="M20 16 h24 v8 h-16 v8 h12 v8 h-12 v12 h-8 z" />
  <circle class="dot" cx="46" cy="46" r="6" />
</svg>